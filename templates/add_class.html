{% extends "base.html" %}  
{# This tells Jinja2 to inherit the layout from base.html #}

{% block content %}
<h1>Add New Class</h1>

<div class="form-container">
    <form action="{{ url_for('add_class') }}" method="POST">
        <label for="name">Class Name</label>
        <input type="text" id="name" name="name" placeholder="Enter class name" required>

        <label for="trainer">Trainer</label>
        <select name="trainer" required>
            <option value="">Select a Trainer</option>
            {% for t in trainers %}
                <option value="{{ t.name }}">{{ t.name }}</option>
            {% endfor %}
        </select>

        <label for="date">Date</label>
        <input type="date" id="date" name="date" required>

        <label for="time">Time</label>
        <input type="time" id="time" name="time" required>

        <label for="capacity">Capacity</label>
        <input type="number" id="capacity" name="capacity" placeholder="Enter max participants" min="1" required>

        <button type="submit">Add Class</button>
    </form>
</div>
{% endblock %}
